<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoachAI Thumbnail</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

.thumb {
  width: 1280px;
  height: 720px;
  background: radial-gradient(ellipse at 70% 30%, #0d2818 0%, #0a0e1a 60%);
  border-radius: 16px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  padding: 64px;
}

/* Subtle grid pattern */
.thumb::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background-image: 
    linear-gradient(rgba(0,212,170,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,170,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* Football pitch lines decorative */
.pitch-lines {
  position: absolute;
  right: -100px;
  top: 50%;
  transform: translateY(-50%);
  width: 600px;
  height: 600px;
  opacity: 0.06;
}

/* Content */
.content { position: relative; z-index: 2; display: flex; flex-direction: column; height: 100%; justify-content: space-between; }

.top-row { display: flex; align-items: center; gap: 12px; }
.tag {
  padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
}
.tag-qvac { background: rgba(0,212,170,0.15); color: #00d4aa; border: 1px solid rgba(0,212,170,0.3); }
.tag-wdk { background: rgba(0,168,255,0.15); color: #00a8ff; border: 1px solid rgba(0,168,255,0.3); }

.main { flex: 1; display: flex; flex-direction: column; justify-content: center; }

.logo-row { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
.emoji { font-size: 56px; }

h1 {
  font-size: 88px; font-weight: 900; line-height: 1;
  background: linear-gradient(135deg, #00d4aa 0%, #00a8ff 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 16px;
}

.tagline { font-size: 26px; color: #8893b0; line-height: 1.4; max-width: 700px; }

.bottom-row { display: flex; align-items: flex-end; justify-content: space-between; }

.punch {
  font-size: 22px; font-weight: 700; color: #00d4aa;
  padding: 12px 24px; background: rgba(0,212,170,0.08);
  border-left: 3px solid #00d4aa; border-radius: 4px;
}

.track-cards { display: flex; gap: 16px; }
.track-card {
  padding: 16px 20px; border-radius: 12px;
  background: rgba(18,24,41,0.8); border: 1px solid rgba(255,255,255,0.06);
  min-width: 160px;
}
.track-card .tc-icon { font-size: 24px; margin-bottom: 8px; }
.track-card .tc-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.track-card .tc-desc { font-size: 12px; color: #4a5670; line-height: 1.4; }
.tc-green .tc-title { color: #00d4aa; }
.tc-green { border-color: rgba(0,212,170,0.2); }
.tc-blue .tc-title { color: #00a8ff; }
.tc-blue { border-color: rgba(0,168,255,0.2); }

/* Glow accents */
.glow-1 { position: absolute; width: 400px; height: 400px; border-radius: 50%; background: radial-gradient(circle, rgba(0,212,170,0.08) 0%, transparent 70%); top: -100px; right: -50px; }
.glow-2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,168,255,0.06) 0%, transparent 70%); bottom: -50px; left: 200px; }

.tether-badge {
  position: absolute; top: 64px; right: 64px; z-index: 3;
  display: flex; align-items: center; gap: 8px;
}
.tether-logo { width: 28px; height: 28px; border-radius: 50%; background: #26a17b; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.tether-text { font-size: 13px; color: #4a5670; font-weight: 600; }
</style>
</head>
<body>

<div class="thumb">
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Football pitch decoration -->
  <svg class="pitch-lines" viewBox="0 0 600 600" fill="none" stroke="#00d4aa" stroke-width="1.5">
    <rect x="50" y="50" width="500" height="500" rx="4" />
    <line x1="300" y1="50" x2="300" y2="550" />
    <circle cx="300" cy="300" r="70" />
    <circle cx="300" cy="300" r="4" fill="#00d4aa" />
    <rect x="50" y="200" width="80" height="200" />
    <rect x="470" y="200" width="80" height="200" />
  </svg>

  <div class="tether-badge">
    <div class="tether-logo">₮</div>
    <span class="tether-text">Tether Developers Cup 2026</span>
  </div>

  <div class="content">
    <div class="top-row">
      <span class="tag tag-qvac">⚡ QVAC</span>
      <span class="tag tag-wdk">🔐 WDK</span>
    </div>

    <div class="main">
      <div class="logo-row">
        <span class="emoji">⚽</span>
        <span class="emoji">🤖</span>
      </div>
      <h1>CoachAI</h1>
      <div class="tagline">Your private AI tactics coach. No cloud. Own your keys. Tip your team.</div>
    </div>

    <div class="bottom-row">
      <div class="punch">Zero cloud. Your keys. Your tactics.</div>
      <div class="track-cards">
        <div class="track-card tc-green">
          <div class="tc-icon">⚡</div>
          <div class="tc-title">QVAC — On-Device AI</div>
          <div class="tc-desc">Llama 3.2 1B<br>Real local inference</div>
        </div>
        <div class="track-card tc-blue">
          <div class="tc-icon">🔐</div>
          <div class="tc-title">WDK — Self-Custody</div>
          <div class="tc-desc">Tron Nile testnet<br>Real signed txs</div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
